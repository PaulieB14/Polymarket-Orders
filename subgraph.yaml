specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: CTFExchange
    network: matic
    source:
      address: "0x4bfb41d5b3570defd03c39a9a4d8de6bd8b8982e"
      startBlock: 33605403
      abi: CTFExchange
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Outcome
        - OrderBook
        - Order
        - OrderFill
        - OrderCancellation
        - PriceLevel
        - Spread
        - MarketDepth
        - OrderFlow
        - MarketMicrostructureEvent
      abis:
        - name: CTFExchange
          file: ./abis/CTFExchange.json
      eventHandlers:
        - event: OrderFilled(indexed bytes32,indexed address,indexed address,uint256,uint256,uint256,uint256,uint256)
          handler: handleOrderFilled
        - event: OrderCancelled(indexed bytes32)
          handler: handleOrderCancelled
        - event: OrdersMatched(indexed bytes32,indexed address,uint256,uint256,uint256,uint256)
          handler: handleOrdersMatched
        - event: TokenRegistered(indexed uint256,indexed uint256,indexed bytes32)
          handler: handleTokenRegistered
      file: ./src/ctf-exchange.ts

  - kind: ethereum
    name: NegRiskCTFExchange
    network: matic
    source:
      address: "0xC5d563A36AE78145C45a50134d48A1215220f80a"
      startBlock: 50505492
      abi: CTFExchange
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Outcome
        - OrderBook
        - Order
        - OrderFill
        - OrderCancellation
        - PriceLevel
        - Spread
        - MarketDepth
        - OrderFlow
        - MarketMicrostructureEvent
      abis:
        - name: CTFExchange
          file: ./abis/CTFExchange.json
      eventHandlers:
        - event: OrderFilled(indexed bytes32,indexed address,indexed address,uint256,uint256,uint256,uint256,uint256)
          handler: handleOrderFilled
        - event: OrderCancelled(indexed bytes32)
          handler: handleOrderCancelled
        - event: OrdersMatched(indexed bytes32,indexed address,uint256,uint256,uint256,uint256)
          handler: handleOrdersMatched
        - event: TokenRegistered(indexed uint256,indexed uint256,indexed bytes32)
          handler: handleTokenRegistered
      file: ./src/negrisk-ctf-exchange.ts

  - kind: ethereum
    name: CTF
    network: matic
    source:
      address: "0x4D97DCd97eC945f40cF65F87097ACe5EA0476045"
      startBlock: 4023686
      abi: CTF
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Outcome
      abis:
        - name: CTF
          file: ./abis/CTF.json
      eventHandlers:
        - event: ConditionPreparation(indexed bytes32,uint256,uint256)
          handler: handleConditionPreparation
        - event: ConditionResolution(indexed bytes32,uint256,uint256,uint256)
          handler: handleConditionResolution
      file: ./src/ctf.ts
